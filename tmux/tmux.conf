# basic tmux settings
set -g mouse off
set -g base-index 1
setw -g pane-base-index 1

# vim-like pane navigation
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# theme customization (before plugin loads)
set -g @minimal_theme_bg_color "default"
set -g @minimal_theme_active_color "colour15"      
set -g @minimal_theme_inactive_color "colour8"    
set -g @minimal_theme_text_color "colour7"       
set -g @minimal_theme_accent_color "colour15"   
set -g @minimal_theme_border_color "colour8"   

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'binoymanoj/tmux-minimal-theme'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# Override plugin settings (must come after plugin initialization)
set -g status-position top
