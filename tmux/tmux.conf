# easy reloading of config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# allow mouse for pane resizing
set -g mouse on

# vim-like pane navigation using ctrl + hjkl
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

bind-key "K" display-popup -h 90% -w 50% -E "sesh picker -i"

bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session

set-option -g status-position top

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_background "default"

# Window list (for the center pills)

# Make status modules have rounded pills on both sides
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_fill "icon"

# Customize icons
set -g @catppuccin_session_icon " "
set -g @catppuccin_application_icon " "
set -g @catppuccin_application_text " #W"
set -g @catppuccin_cpu_icon " "
set -g @catppuccin_uptime_icon " "
set -g @catppuccin_battery_icon " "
set -g @catppuccin_directory_icon " "

# Customize window list to show: number | directory with ~ prefix
set -g @catppuccin_window_text " #(echo '#{pane_current_path}' | sed \"s|$HOME|~|\")"
set -g @catppuccin_window_current_text " #(echo '#{pane_current_path}' | sed \"s|$HOME|~|\")"
set -g @catppuccin_window_number " #I"
set -g @catppuccin_window_current_number " #I"

set -g @catppuccin_window_text_color "#{@thm_surface_0}"
set -g @catppuccin_window_current_text_color "#{@thm_overlay_0}"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -ag status-left "#{E:@catppuccin_status_session}"
set -ag status-left " "
set -ag status-left "#{E:@catppuccin_status_directory}"
set -ag status-left " "
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right " "
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right " "
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -ag status-right " "
set -agF status-right "#{E:@catppuccin_status_battery}"

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
