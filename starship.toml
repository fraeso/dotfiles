"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
${custom.giturl}\
$git_branch\
${custom.git_worktree}\
$git_status\
$git_state\
$cmd_duration\
$line_break\
$python\
$character"""

[directory]
style = "blue"

[character]
success_symbol = "[â‌¯](purple)"
error_symbol = "[â‌¯](red)"
vimcmd_symbol = "[â‌®](green)"

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="ï‚› "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="ïٹ– "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="ï…± "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="ï‡“ "
else
    GIT_REMOTE_SYMBOL="îœ‚ "
fi
echo "$GIT_REMOTE_SYMBOL"
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "$output"
require_repo = true
ignore_timeout = true

[git_branch]
symbol = "[î‚¶](black)ïگک "
style = "fg:purple bg:black"
format =  "  [$symbol$branch]($style)[î‚´](black)"
truncation_length = 32
truncation_symbol = "â€¦"

[git_status]
format = "[$untracked$staged$modified$renamed$deleted$conflicted$ahead_behind$stashed]($style) "
staged     = "[+$count ](green)"
modified   = "[!$count ](yellow)"
renamed    = "[آ»$count ](blue)"
deleted    = "[-$count ](red)"
untracked  = "[?$count ](red)"
stashed    = "[â‰، ](purple)"
conflicted = "[âœ–$count ](red bold)"

ahead      = "[â‡،$count ](cyan)"
behind     = "[â‡£$count ](bright-yellow)"
diverged   = "[â‡•â‡،$ahead_countâ‡£$behind_count ](purple)"

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
if git rev-parse --git-dir >/dev/null 2>&1; then
      common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
      git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
      if [ "$common_dir" != "$git_dir" ]; then
            echo "â›“ "
      fi
fi
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = " ([$output ]($style))"
style = "bold green"
require_repo = true
ignore_timeout = true

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
detect_extensions = []
detect_files = []
